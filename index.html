    <h1>我的第一篇开源实践博客</h1>
    <h2>实践内容</h2>
    <p>本次开源实践作业，使用GitHub Pages + GitHub Actions搭建个人博客。按照要求，仓库根目录存放index.html作为博客主页。全程仅使用浏览器在线操作，未安装任何本地软件，提交文件后自动部署网站。</p>
    <h2>操作总结</h2>
    <p>1. 创建公开专属仓库 ztt-spec.github.io；
    <br>2. 根目录新建index.html博客页面；
    <br>3. 配置GitHub Actions自动部署流水线；
    <br>4. 在Pages设置中选择GitHub Actions作为部署来源。</p>
